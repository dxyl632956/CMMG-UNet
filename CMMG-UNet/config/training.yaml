TRAIN:
  train_batch_size: 32
  lr: 0.0003

  valid_batch_size: 32

  image_size: [224,224]

  min_epochs: 1
  max_epochs: 50
  patience: 20

  device: 1

  model_save_path: ../autodl-tmp/save_model
  model_save_filename: kmmgunet 

MODEL:
  bert_type: ../MMI-UNet-main_end/lib/BiomedVLP-CXR-BERT-specialized
  vision_type: ../MMI-UNet-main_end/lib/convnext-tiny-224
  project_dim: 768
  memory_N: 512
  memory_K: 3
  warmup_epochs: 0
  cluster_k: 100
